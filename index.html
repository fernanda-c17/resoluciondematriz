<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matrix Solver Pro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
    min-height:100vh;
    color:white;
    padding:20px;
}

.container{
    max-width:1300px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    font-size:42px;
    color:#38bdf8;
}

.title p{
    color:#cbd5e1;
    margin-top:10px;
}

.card{
    background:rgba(15,23,42,.9);
    border:1px solid rgba(255,255,255,.08);
    border-radius:25px;
    padding:25px;
    box-shadow:0 0 30px rgba(0,0,0,.4);
    backdrop-filter:blur(10px);
}

.matrix-container{
    display:flex;
    justify-content:center;
    margin-bottom:30px;
}

.matrix{
    display:grid;
    grid-template-columns:repeat(4,90px);
    gap:12px;
}

.matrix input{
    width:90px;
    height:80px;
    border:none;
    border-radius:18px;
    background:#f8fafc;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#0f172a;
    outline:none;
    transition:.3s;
}

.matrix input:focus{
    transform:scale(1.05);
    box-shadow:0 0 15px #38bdf8;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

button{
    padding:16px 26px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

.solve{
    background:#2563eb;
    color:white;
}

.clear{
    background:#dc2626;
    color:white;
}

.example{
    background:#16a34a;
    color:white;
}

button:hover{
    transform:translateY(-3px) scale(1.05);
}

.output{
    display:grid;
    grid-template-columns:1fr 350px;
    gap:20px;
}

.steps{
    background:#0f172a;
    border-radius:20px;
    padding:20px;
    max-height:750px;
    overflow-y:auto;
}

.result{
    background:#0f172a;
    border-radius:20px;
    padding:20px;
    height:fit-content;
    position:sticky;
    top:20px;
}

.step{
    background:#1e293b;
    margin-bottom:20px;
    border-radius:18px;
    padding:20px;
    animation:fade .5s ease;
}

.step h3{
    color:#38bdf8;
    margin-bottom:15px;
}

.matrix-table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:15px;
}

.matrix-table td{
    border:1px solid rgba(255,255,255,.15);
    padding:14px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    background:#0f172a;
}

.matrix-table td.separator{
    background:#2563eb;
    width:8px;
    padding:0;
}

.result h2{
    color:#38bdf8;
    margin-bottom:20px;
}

.result-box{
    background:#1e293b;
    border-radius:18px;
    padding:25px;
    line-height:2.2;
    font-size:28px;
    text-align:center;
}

.fraction{
    color:#4ade80;
    font-weight:bold;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:900px){

    .output{
        grid-template-columns:1fr;
    }

    .matrix{
        grid-template-columns:repeat(4,70px);
    }

    .matrix input{
        width:70px;
        height:70px;
        font-size:20px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>Matrix de Fernanda Romero</h1>
        <p>Reducción organizadas</p>
    </div>

    <div class="card">

        <div class="matrix-container">

            <div class="matrix">

                <input type="number" id="e11">
                <input type="number" id="e12">
                <input type="number" id="e13">
                <input type="number" id="e14">

                <input type="number" id="e21">
                <input type="number" id="e22">
                <input type="number" id="e23">
                <input type="number" id="e24">

                <input type="number" id="e31">
                <input type="number" id="e32">
                <input type="number" id="e33">
                <input type="number" id="e34">

            </div>

        </div>

        <div class="buttons">

            <button class="solve" onclick="solveMatrix()">
                Resolver Matriz
            </button>

            <button class="clear" onclick="clearMatrix()">
                Limpiar
            </button>

            <button class="example" onclick="loadExample()">
                Ejemplo
            </button>

        </div>

        <div class="output">

            <div class="steps" id="steps">

                <h2>Procedimiento</h2>

            </div>

            <div class="result">

                <h2>Resultado Final</h2>

                <div class="result-box" id="result">

                    Esperando cálculo...

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function gcd(a,b){
    return b ? gcd(b,a%b) : a;
}

function toFraction(decimal){

    if(Number.isInteger(decimal)){
        return decimal.toString();
    }

    let precision = 1000000;

    let numerator = Math.round(decimal * precision);

    let denominator = precision;

    let divisor = gcd(Math.abs(numerator), denominator);

    numerator /= divisor;
    denominator /= divisor;

    return `${numerator}/${denominator}`;
}

function cloneMatrix(matrix){
    return JSON.parse(JSON.stringify(matrix));
}

function getMatrix(){

    return [

        [
            parseFloat(e11.value),
            parseFloat(e12.value),
            parseFloat(e13.value),
            parseFloat(e14.value)
        ],

        [
            parseFloat(e21.value),
            parseFloat(e22.value),
            parseFloat(e23.value),
            parseFloat(e24.value)
        ],

        [
            parseFloat(e31.value),
            parseFloat(e32.value),
            parseFloat(e33.value),
            parseFloat(e34.value)
        ]
    ];
}

function matrixHTML(matrix){

    let html = `
    
    <table class="matrix-table">
    `;

    for(let i=0;i<3;i++){

        html += `<tr>`;

        for(let j=0;j<4;j++){

            if(j === 3){
                html += `<td class="separator"></td>`;
            }

            html += `
            <td>${toFraction(Number(matrix[i][j].toFixed(6)))}</td>
            `;
        }

        html += `</tr>`;
    }

    html += `</table>`;

    return html;
}

function addStep(title,matrix){

    document.getElementById("steps").innerHTML += `

        <div class="step">

            <h3>${title}</h3>

            ${matrixHTML(matrix)}

        </div>

    `;
}

function solveMatrix(){

    document.getElementById("steps").innerHTML =
    "<h2>Procedimiento</h2>";

    let matrix = getMatrix();

    for(let i=0;i<3;i++){

        for(let j=0;j<4;j++){

            if(isNaN(matrix[i][j])){

                alert("Completa todos los campos");
                return;
            }
        }
    }

    addStep("PASO 1 - MATRIZ INICIAL", cloneMatrix(matrix));

    for(let i=0;i<3;i++){

        let pivot = matrix[i][i];

        if(pivot === 0){

            alert("No se puede resolver");
            return;
        }

        for(let j=0;j<4;j++){

            matrix[i][j] /= pivot;
        }

        addStep(
            `R${i+1} = R${i+1} ÷ ${toFraction(pivot)}`,
            cloneMatrix(matrix)
        );

        for(let k=0;k<3;k++){

            if(k !== i){

                let factor = matrix[k][i];

                for(let j=0;j<4;j++){

                    matrix[k][j] -= factor * matrix[i][j];
                }

                addStep(
                    `R${k+1} = R${k+1} - (${toFraction(factor)})R${i+1}`,
                    cloneMatrix(matrix)
                );
            }
        }
    }

    let x = toFraction(Number(matrix[0][3].toFixed(6)));
    let y = toFraction(Number(matrix[1][3].toFixed(6)));
    let z = toFraction(Number(matrix[2][3].toFixed(6)));

    document.getElementById("result").innerHTML = `

        <div class="fraction">

            x = ${x}<br><br>

            y = ${y}<br><br>

            z = ${z}

        </div>

    `;
}

function clearMatrix(){

    let inputs = document.querySelectorAll("input");

    inputs.forEach(input=>{

        input.value = "";
    });

    document.getElementById("steps").innerHTML =
    "<h2>Procedimiento</h2>";

    document.getElementById("result").innerHTML =
    "Esperando cálculo...";
}

function loadExample(){

    let values = [

        2,1,-1,8,
        -3,-1,2,-11,
        -2,1,2,-3

    ];

    let inputs = document.querySelectorAll("input");

    inputs.forEach((input,index)=>{

        input.value = values[index];
    });
}

</script>

</body>
</html>
